<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Songseekr</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a25;
    --accent: #ff3d6e;
    --accent2: #6c3de8;
    --gold: #f5c842;
    --text: #f0eeff;
    --muted: #6b6880;
    --border: rgba(255,255,255,0.07);
    --glow: rgba(255,61,110,0.35);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow-x: hidden;
  }

  .phone {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* Ambient background blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }
  .blob1 { width: 280px; height: 280px; background: var(--accent2); top: -80px; left: -60px; }
  .blob2 { width: 220px; height: 220px; background: var(--accent); top: 40%; right: -80px; }
  .blob3 { width: 180px; height: 180px; background: var(--gold); bottom: 10%; left: 10%; }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .selected-count {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    background: var(--surface);
    padding: 5px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    transition: all 0.3s;
  }

  .selected-count.has-items {
    color: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 12px var(--glow);
  }

  /* Search / mood bar */
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px 10px 38px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
  }

  .search-input:focus { border-color: var(--accent2); }
  .search-input::placeholder { color: var(--muted); }

  .ai-btn {
    flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    padding: 10px 14px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ai-btn:active { transform: scale(0.95); opacity: 0.85; }

  /* Mood chips */
  .moods {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 14px 22px 0;
    position: relative;
    z-index: 1;
  }
  .moods::-webkit-scrollbar { display: none; }

  .mood-chip {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    transition: all 0.2s;
    user-select: none;
  }
  .mood-chip:hover { border-color: var(--accent2); color: var(--text); }
  .mood-chip.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent;
    color: #fff;
    box-shadow: 0 4px 16px rgba(108,61,232,0.4);
  }

  /* Section label */
  .section-label {
    padding: 18px 22px 10px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    font-weight: 500;
    position: relative;
    z-index: 1;
  }

  /* Song list */
  .song-list {
    flex: 1;
    padding: 0 16px 100px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    z-index: 1;
  }

  .song-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .song-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    opacity: 0;
    background: linear-gradient(135deg, rgba(255,61,110,0.1), rgba(108,61,232,0.1));
    transition: opacity 0.2s;
  }

  .song-card:hover::before, .song-card.selected::before { opacity: 1; }

  .song-card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(255,61,110,0.2);
  }

  .album-art {
    width: 52px;
    height: 52px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    position: relative;
  }

  .song-info { flex: 1; min-width: 0; }

  .song-title {
    font-size: 15px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .song-meta {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .song-tags {
    display: flex;
    gap: 4px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 6px;
    background: rgba(255,255,255,0.07);
    color: var(--muted);
  }

  .check-circle {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .song-card.selected .check-circle {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check-circle svg { opacity: 0; transition: opacity 0.2s; }
  .song-card.selected .check-circle svg { opacity: 1; }

  /* Loading skeleton */
  .skeleton { animation: shimmer 1.5s infinite; }
  @keyframes shimmer {
    0%,100% { opacity: 0.4; }
    50%      { opacity: 0.8; }
  }

  /* Playlist bar */
  .playlist-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 420px;
    background: rgba(13,13,20,0.95);
    backdrop-filter: blur(24px);
    border-top: 1px solid var(--border);
    padding: 14px 22px 24px;
    z-index: 20;
    transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
  }

  .playlist-bar.hidden { transform: translateX(-50%) translateY(100%); }

  .bar-inner {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .playlist-info { flex: 1; min-width: 0; }
  .playlist-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .playlist-subtitle { font-size: 11px; color: var(--muted); }

  .playlist-tracks {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .track-pill {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
    max-width: 150px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .track-pill-x {
    cursor: pointer;
    opacity: 0.5;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .track-pill-x:hover { opacity: 1; }

  .bar-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .action-btn {
    flex: 1;
    border: none;
    border-radius: 12px;
    padding: 11px 8px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    transition: opacity 0.2s, transform 0.15s;
  }
  .action-btn:active { transform: scale(0.95); opacity: 0.8; }

  .btn-save {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 4px 16px var(--glow);
  }
  .btn-copy { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
  .btn-csv  { background: var(--surface); border: 1px solid var(--border); color: var(--text); }

  /* ---- Custom Song Entry ---- */
  .add-song-bar { padding: 10px 16px 0; position: relative; z-index: 1; }
  .add-song-toggle {
    width: 100%; background: var(--surface); border: 1px dashed rgba(108,61,232,0.4);
    border-radius: 14px; padding: 11px 16px; color: var(--accent2);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s;
  }
  .add-song-toggle:hover { border-color: var(--accent2); background: rgba(108,61,232,0.08); }
  .add-song-form {
    background: var(--card); border: 1px solid var(--accent2); border-radius: 16px;
    padding: 16px; display: none; flex-direction: column; gap: 10px;
    box-shadow: 0 4px 24px rgba(108,61,232,0.2); margin-top: 8px;
  }
  .add-song-form.open { display: flex; }
  .form-row { display: flex; gap: 8px; }
  .form-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; transition: border 0.2s;
  }
  .form-input:focus { border-color: var(--accent2); }
  .form-input::placeholder { color: var(--muted); }
  .form-add-btn {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none; border-radius: 10px; padding: 10px 16px; color: #fff;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap; transition: opacity 0.2s;
  }
  .form-add-btn:active { opacity: 0.8; }
  .form-cancel {
    background: none; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 12px; cursor: pointer; text-align: center; padding: 4px;
  }

  /* ---- Drag handle on song cards ---- */
  .drag-handle {
    cursor: grab; color: var(--muted); display: flex; flex-direction: column;
    gap: 3px; padding: 4px 2px; flex-shrink: 0; opacity: 0; transition: opacity 0.2s;
  }
  .song-card:hover .drag-handle, .song-card.selected .drag-handle { opacity: 1; }
  .drag-handle span { display: block; width: 16px; height: 2px; background: currentColor; border-radius: 1px; }
  .song-card.dragging { opacity: 0.4; transform: scale(0.97); border-color: var(--accent2); }
  .song-card.drag-over { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }

  /* ---- Reorder panel in playlist bar ---- */
  .reorder-panel {
    max-height: 0; overflow: hidden; transition: max-height 0.35s ease; margin-bottom: 0;
  }
  .reorder-panel.open { max-height: 220px; overflow-y: auto; margin-bottom: 10px; }
  .reorder-panel::-webkit-scrollbar { width: 3px; }
  .reorder-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .reorder-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 10px;
    background: var(--surface); border-radius: 10px; margin-bottom: 6px;
    border: 1px solid var(--border); cursor: grab; user-select: none; transition: all 0.15s;
  }
  .reorder-item.ri-dragging { opacity: 0.35; }
  .reorder-item.ri-over { border-color: var(--accent); background: rgba(255,61,110,0.08); }
  .ri-grip { color: var(--muted); font-size: 14px; flex-shrink: 0; }
  .ri-emoji { font-size: 16px; flex-shrink: 0; }
  .ri-name { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ri-artist { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; max-width: 80px; }
  .ri-remove { color: var(--muted); font-size: 12px; cursor: pointer; flex-shrink: 0; padding: 2px 4px; transition: color 0.15s; }
  .ri-remove:hover { color: var(--accent); }
  .reorder-toggle {
    background: none; border: none; color: var(--accent2); font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 600; cursor: pointer; padding: 0; letter-spacing: 0.3px;
  }

  /* Named playlist modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 50;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal-sheet {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border-radius: 24px 24px 0 0;
    border: 1px solid var(--border);
    padding: 24px 22px 36px;
    transform: translateY(40px);
    transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
  }
  .modal-overlay.open .modal-sheet { transform: translateY(0); }

  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    margin-bottom: 6px;
    color: var(--text);
  }

  .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; }

  .playlist-name-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    margin-bottom: 14px;
    transition: border 0.2s;
  }
  .playlist-name-input:focus { border-color: var(--accent2); }

  .saved-playlists { margin-bottom: 16px; }
  .saved-pl-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 10px; }

  .pl-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: var(--surface);
    border-radius: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }
  .pl-item:hover { border-color: var(--accent2); }
  .pl-item-info { flex: 1; min-width: 0; }
  .pl-item-name { font-size: 14px; font-weight: 500; }
  .pl-item-count { font-size: 11px; color: var(--muted); }
  .pl-item-del {
    font-size: 16px;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .pl-item-del:hover { color: var(--accent); }

  .modal-confirm-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 14px;
    padding: 14px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .modal-confirm-btn:active { opacity: 0.85; }

  .modal-cancel {
    width: 100%;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    margin-top: 10px;
    padding: 8px;
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 18px;
    font-size: 13px;
    color: var(--text);
    z-index: 100;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 30px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.6; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* AI loading */
  .ai-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 30px;
    color: var(--muted);
    font-size: 14px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30%          { transform: translateY(-8px); }
  }
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="phone">
  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="logo">SONGSEEKR</div>
      <div class="selected-count" id="selectedCount">0 selected</div>
    </div>
    <div class="controls">
      <div class="search-wrap">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input class="search-input" id="searchInput" placeholder="Search songs, artists..." type="text">
      </div>
      <button class="ai-btn" id="aiBtn" onclick="suggestWithAI()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
        AI Suggest
      </button>
    </div>
  </div>

  <!-- Mood chips -->
  <div class="moods" id="moodsContainer">
    <div class="mood-chip active" data-mood="all" onclick="setMood(this, 'all')">All</div>
    <div class="mood-chip" data-mood="worship" onclick="setMood(this, 'worship')">🙏 Worship</div>
    <div class="mood-chip" data-mood="chill" onclick="setMood(this, 'chill')">😌 Chill</div>
    <div class="mood-chip" data-mood="hype" onclick="setMood(this, 'hype')">🔥 Hype</div>
    <div class="mood-chip" data-mood="sad" onclick="setMood(this, 'sad')">💙 Sad</div>
    <div class="mood-chip" data-mood="focus" onclick="setMood(this, 'focus')">🎯 Focus</div>
    <div class="mood-chip" data-mood="party" onclick="setMood(this, 'party')">🎉 Party</div>
  </div>

  <div class="section-label" id="sectionLabel">SUGGESTED FOR YOU</div>

  <!-- Custom song entry -->
  <div class="add-song-bar">
    <button class="add-song-toggle" id="addToggleBtn" onclick="toggleAddForm()">
      <span style="font-size:16px">＋</span> Add your own song
    </button>
    <div class="add-song-form" id="addSongForm">
      <div class="form-row">
        <input class="form-input" id="customTitle" placeholder="Song title *" maxlength="80">
        <input class="form-input" id="customArtist" placeholder="Artist" maxlength="60" style="max-width:140px">
      </div>
      <div class="form-row">
        <input class="form-input" id="customGenre" placeholder="Genre" maxlength="40">
        <button class="form-add-btn" onclick="addCustomSong()">Add ＋</button>
      </div>
      <button class="form-cancel" onclick="toggleAddForm()">Cancel</button>
    </div>
  </div>

  <!-- Song list -->
  <div class="song-list" id="songList"></div>

// ===================== STATE (with localStorage persistence) =====================
const STORAGE_KEY = 'songseekr_v2';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      selectedIds: [...selectedIds],
      selectedOrder,
      savedPlaylists,
      customSongs: allSongs.filter(s => s.custom),
    }));
  } catch(e) { console.warn('Storage unavailable', e); }
}

const saved = loadState();

let allSongs = [...SONGS, ...(saved?.customSongs || [])];
let selectedIds = new Set(saved?.selectedIds || []);
let selectedOrder = saved?.selectedOrder || []; // ordered list of ids
let savedPlaylists = saved?.savedPlaylists || [];
let currentMood = 'all';
let currentSearch = '';
let isLoading = false;
let reorderOpen = false;

// Sync selectedOrder with selectedIds on load
selectedOrder = selectedOrder.filter(id => selectedIds.has(id));
selectedIds.forEach(id => { if (!selectedOrder.includes(id)) selectedOrder.push(id); });

// ===================== FILTERING =====================
function getFiltered() {
  return allSongs.filter(s => {
    const matchMood = currentMood === 'all' || s.mood.includes(currentMood);
    const q = currentSearch.toLowerCase();
    const matchSearch = !q || s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q) || (s.genre||'').toLowerCase().includes(q);
    return matchMood && matchSearch;
  }).sort((a, b) => a.title.localeCompare(b.title));
}

function getSelectedSongs() {
  // Return in selectedOrder order
  return selectedOrder.map(id => allSongs.find(s => s.id === id)).filter(Boolean);
}

// ===================== RENDER SONGS =====================
function renderSongs(songs) {
  const list = document.getElementById('songList');
  list.innerHTML = '';
  if (!songs.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🎵</div><p>No songs match your search.<br>Try a different mood or keyword.</p></div>`;
    return;
  }
  songs.forEach((s, i) => {
    const selected = selectedIds.has(s.id);
    const card = document.createElement('div');
    card.className = 'song-card' + (selected ? ' selected' : '');
    card.style.animationDelay = `${i * 0.04}s`;
    card.dataset.id = s.id;
    card.draggable = true;
    card.innerHTML = `
      <div class="drag-handle"><span></span><span></span><span></span></div>
      <div class="album-art" style="background:${s.color}22;border:1px solid ${s.color}44;">
        <span>${s.emoji}</span>
      </div>
      <div class="song-info">
        <div class="song-title">${s.title}${s.custom ? ' <span style="font-size:10px;color:var(--accent2);font-weight:600;">CUSTOM</span>' : ''}</div>
        <div class="song-meta">${s.artist || '—'}</div>
        <div class="song-tags">
          ${s.genre ? `<span class="tag">${s.genre}</span>` : ''}
          ${(s.mood||[]).map(m => `<span class="tag">${m}</span>`).join('')}
        </div>
      </div>
      <div class="check-circle">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <polyline points="2,6 5,9 10,3" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>`;
    card.addEventListener('click', e => {
      if (e.target.closest('.drag-handle')) return;
      toggleSong(s.id);
    });
    // Drag on song list (for ordering selected songs via reorder panel, not the card list)
    list.appendChild(card);
  });
}

// ===================== TOGGLE =====================
function toggleSong(id) {
  if (selectedIds.has(id)) {
    selectedIds.delete(id);
    selectedOrder = selectedOrder.filter(x => x !== id);
  } else {
    selectedIds.add(id);
    selectedOrder.push(id);
  }
  updateUI();
  saveState();
}

// ===================== UPDATE UI =====================
function updateUI() {
  document.querySelectorAll('.song-card').forEach(card => {
    const id = parseInt(card.dataset.id);
    card.classList.toggle('selected', selectedIds.has(id));
  });
  const count = selectedIds.size;
  const badge = document.getElementById('selectedCount');
  badge.textContent = count === 0 ? '0 selected' : `${count} selected`;
  badge.classList.toggle('has-items', count > 0);

  const bar = document.getElementById('playlistBar');
  bar.classList.toggle('hidden', count === 0);

  if (count > 0) {
    document.getElementById('playlistSub').textContent = `${count} track${count !== 1 ? 's' : ''} selected`;
    renderReorderPanel();
  } else {
    reorderOpen = false;
    document.getElementById('reorderPanel').classList.remove('open');
    document.getElementById('reorderToggleBtn').textContent = '↕ Reorder';
  }
}

// ===================== REORDER PANEL =====================
function toggleReorder() {
  reorderOpen = !reorderOpen;
  document.getElementById('reorderPanel').classList.toggle('open', reorderOpen);
  document.getElementById('reorderToggleBtn').textContent = reorderOpen ? '↑↓ Done' : '↕ Reorder';
  if (reorderOpen) renderReorderPanel();
}

let riDragIdx = null;

function renderReorderPanel() {
  const panel = document.getElementById('reorderPanel');
  const songs = getSelectedSongs();
  panel.innerHTML = songs.map((s, i) => `
    <div class="reorder-item" draggable="true" data-idx="${i}"
         ondragstart="riDragStart(${i})" ondragover="riDragOver(event,${i})"
         ondrop="riDrop(event,${i})" ondragend="riDragEnd()">
      <span class="ri-grip">⠿</span>
      <span class="ri-emoji">${s.emoji}</span>
      <span class="ri-name">${s.title}</span>
      <span class="ri-artist">${s.artist||''}</span>
      <span class="ri-remove" onclick="toggleSong(${s.id})">✕</span>
    </div>`).join('');
}

function riDragStart(idx) {
  riDragIdx = idx;
  setTimeout(() => {
    document.querySelectorAll('.reorder-item')[idx]?.classList.add('ri-dragging');
  }, 0);
}

function riDragOver(e, idx) {
  e.preventDefault();
  document.querySelectorAll('.reorder-item').forEach((el, i) => el.classList.toggle('ri-over', i === idx));
}

function riDrop(e, idx) {
  e.preventDefault();
  if (riDragIdx === null || riDragIdx === idx) return;
  const moved = selectedOrder.splice(riDragIdx, 1)[0];
  selectedOrder.splice(idx, 0, moved);
  renderReorderPanel();
  saveState();
}

function riDragEnd() {
  riDragIdx = null;
  document.querySelectorAll('.reorder-item').forEach(el => el.classList.remove('ri-dragging','ri-over'));
}

// ===================== MOOD / SEARCH =====================
function setMood(el, mood) {
  document.querySelectorAll('.mood-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentMood = mood;
  document.getElementById('sectionLabel').textContent = mood === 'all' ? 'SUGGESTED FOR YOU' : mood.toUpperCase() + ' VIBES';
  renderSongs(getFiltered());
}

document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value;
  document.getElementById('sectionLabel').textContent = currentSearch ? 'SEARCH RESULTS' : (currentMood === 'all' ? 'SUGGESTED FOR YOU' : currentMood.toUpperCase() + ' VIBES');
  renderSongs(getFiltered());
});

// ===================== CUSTOM SONG ENTRY =====================
function toggleAddForm() {
  const form = document.getElementById('addSongForm');
  const btn  = document.getElementById('addToggleBtn');
  const open = form.classList.toggle('open');
  btn.style.display = open ? 'none' : 'flex';
  if (open) document.getElementById('customTitle').focus();
}

const CUSTOM_EMOJIS = ['🎵','🎶','🎸','🎹','🎺','🎻','🥁','🎤','🎧','🪗','🪘','🎼'];
const CUSTOM_COLORS = ['#e879a0','#7c6fef','#4fb4d8','#e8a84f','#6dbf7e','#e06450'];

function addCustomSong() {
  const title = document.getElementById('customTitle').value.trim();
  if (!title) { showToast('Song title is required!'); document.getElementById('customTitle').focus(); return; }
  const artist = document.getElementById('customArtist').value.trim() || 'Unknown Artist';
  const genre  = document.getElementById('customGenre').value.trim()  || 'Custom';
  const id = Date.now();
  const song = {
    id, title, artist, genre,
    mood: ['chill'],
    emoji: CUSTOM_EMOJIS[Math.floor(Math.random() * CUSTOM_EMOJIS.length)],
    color: CUSTOM_COLORS[Math.floor(Math.random() * CUSTOM_COLORS.length)],
    custom: true,
  };
  allSongs.push(song);
  selectedIds.add(id);
  selectedOrder.push(id);
  ['customTitle','customArtist','customGenre'].forEach(id => document.getElementById(id).value = '');
  toggleAddForm();
  renderSongs(getFiltered());
  updateUI();
  saveState();
  showToast(`✅ "${title}" added to your list!`);
}

// Enter key in custom form
['customTitle','customArtist','customGenre'].forEach(fieldId => {
  document.getElementById(fieldId).addEventListener('keydown', e => { if (e.key === 'Enter') addCustomSong(); });
});

// ===================== AI SUGGEST =====================
async function suggestWithAI() {
  if (isLoading) return;
  isLoading = true;
  const btn = document.getElementById('aiBtn');
  btn.style.opacity = '0.6'; btn.textContent = '...';
  const list = document.getElementById('songList');
  list.innerHTML = `<div class="ai-loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span style="margin-left:8px">AI is curating your list…</span></div>`;
  const moodText   = currentMood === 'all' ? 'a variety of moods' : currentMood;
  const searchText = currentSearch ? ` with a theme of "${currentSearch}"` : '';
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514", max_tokens:1000,
        messages:[{ role:"user", content:`Suggest 6 real song titles${searchText} matching mood: ${moodText}.
Return ONLY a JSON array (no backticks, no markdown):
[{"title":"Song Name","artist":"Artist Name","genre":"Genre","mood":["mood1","mood2"],"emoji":"🎵"}]
Mood values must be from: chill, hype, sad, romantic, focus, party.` }]
      })
    });
    const data = await response.json();
    const raw  = data.content.map(b => b.text||'').join('');
    const suggestions = JSON.parse(raw.replace(/```json|```/g,'').trim());
    const colors = ["#ff5e7a","#a56cfe","#5b9cf6","#f5c842","#78c5a0","#ffa56e","#b5ff6e","#6ecfff","#c06eff","#ff6e8a"];
    const newSongs = suggestions.map((s,i) => ({ ...s, id:Date.now()+i, color:colors[i%colors.length], custom:false }));
    newSongs.forEach(s => { if (!allSongs.find(x => x.id===s.id)) allSongs.push(s); });
    document.getElementById('sectionLabel').textContent = '✨ AI SUGGESTIONS';
    renderSongs(newSongs);
    showToast(`✨ ${newSongs.length} AI-curated songs for you!`);
  } catch(err) {
    showToast('Could not reach AI. Showing local songs.');
    renderSongs(getFiltered());
  }
  btn.style.opacity='1';
  btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> AI Suggest`;
  isLoading=false;
}

// ===================== NAMED PLAYLISTS =====================
function openSaveModal() {
  const count = selectedIds.size;
  if (!count) { showToast('Select some songs first!'); return; }
  document.getElementById('modalSub').textContent = `${count} track${count!==1?'s':''} will be saved.`;
  document.getElementById('playlistNameInput').value = '';
  renderSavedPlaylists();
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target===document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}

function confirmSave() {
  const name = document.getElementById('playlistNameInput').value.trim() || `Playlist ${savedPlaylists.length+1}`;
  const tracks = getSelectedSongs().map(s => ({ title:s.title, artist:s.artist, genre:s.genre, emoji:s.emoji }));
  savedPlaylists.unshift({ name, tracks, date: new Date().toLocaleDateString() });
  renderSavedPlaylists();
  document.getElementById('modalOverlay').classList.remove('open');
  saveState();
  showToast(`✅ "${name}" saved with ${tracks.length} tracks!`);
}

function renderSavedPlaylists() {
  const section = document.getElementById('savedPlaylistsSection');
  const list    = document.getElementById('savedPlaylistsList');
  if (!savedPlaylists.length) { section.style.display='none'; return; }
  section.style.display='block';
  list.innerHTML = savedPlaylists.map((pl,i) => `
    <div class="pl-item">
      <div style="font-size:20px">🎵</div>
      <div class="pl-item-info">
        <div class="pl-item-name">${pl.name}</div>
        <div class="pl-item-count">${pl.tracks.length} tracks · ${pl.date||''}</div>
      </div>
      <span class="pl-item-del" onclick="deletePlaylist(${i})">🗑</span>
    </div>`).join('');
}

function deletePlaylist(i) {
  savedPlaylists.splice(i,1);
  renderSavedPlaylists();
  saveState();
}

// ===================== COPY =====================
function copyToClipboard() {
  const songs = getSelectedSongs();
  if (!songs.length) { showToast('Select some songs first!'); return; }
  const text = songs.map((s,i) => `${i+1}. ${s.title} — ${s.artist}`).join('\n');
  navigator.clipboard.writeText(text).then(() => showToast(`📋 ${songs.length} songs copied!`))
    .catch(() => { const ta=document.createElement('textarea'); ta.value=text; ta.style.cssText='position:fixed;opacity:0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast(`📋 ${songs.length} songs copied!`); });
}

// ===================== CSV =====================
function downloadCSV() {
  const songs = getSelectedSongs();
  if (!songs.length) { showToast('Select some songs first!'); return; }
  const csv = ['Title,Artist,Genre,Moods', ...songs.map(s => `"${s.title}","${s.artist||''}","${s.genre||''}","${(s.mood||[]).join('; ')}"`)].join('\n');
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(new Blob([csv],{type:'text/csv'})), download:'songseekr_playlist.csv' });
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showToast(`⬇ CSV downloaded — ${songs.length} tracks!`);
}

function savePlaylist() { openSaveModal(); }

// ===================== TOAST =====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ===================== INIT =====================
renderSongs(getFiltered());
updateUI();

</script>
</body>
</html>
